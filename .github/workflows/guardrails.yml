name: Guardrails

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Shell syntax check
        run: |
          bash -n setup
          bash -n install
          bash -n lib/env.sh
          bash -n lib/visual-audit.sh
          bash -n lib/telemetry-end.sh
          bash -n bin/designStack-validate

      - name: Run repository validator
        run: bin/designStack-validate

      - name: Run skill eval fixtures
        run: bin/designStack-eval
